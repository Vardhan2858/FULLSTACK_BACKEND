services:
  - type: web
    name: organic-marketplace-backend
    runtime: java
    plan: standard
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/full-stack-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        scope: build,runtime
        value: jdbc:mysql://${DB_HOST}:3306/fullstack_db
      - key: SPRING_DATASOURCE_USERNAME
        scope: build,runtime
        value: ${DB_USER}
      - key: SPRING_DATASOURCE_PASSWORD
        scope: build,runtime
        value: ${DB_PASSWORD}
      - key: SERVER_PORT
        scope: build,runtime
        value: 8080
      - key: APP_CORS_ALLOWED_ORIGINS
        scope: build,runtime
        value: ${FRONTEND_URL}
      - key: JWT_SECRET
        scope: build,runtime
        value: ${JWT_SECRET}
      - key: JWT_EXPIRATION_MS
        scope: build,runtime
        value: 86400000
databases:
  - name: fullstack_db
    databaseName: fullstack_db
    user: ${DB_USER}
    plan: standard
